<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/Login.css">
    <title>Login</title>
</head>
<body>
     <main>
        <section class="logotipo">
            <div id="logo">T</div>
            <h1>TechLaço</h1>
        </section>

        <section class="cadastro">
            <div id="titulo">
                <h1>Bem Vindo!</h1>
                <h3>Entre para acessar sua conta</h3>
            </div>

            <form action="" method="post">
                <div id="inputEmail">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com">
                </div>

                <div id="inputSenha">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="suaSenha">
                    <span>Esqueci a senha</span>
                </div>

                <button type="submit">Entrar</button>

                <span id="naoPossuiConta">Ainda não possui conta? <a href="./Cadastro.html">Cadastre-se</a></span>
            </form>
        </section>

        <section class="voltar">
            <img src="../Assets/Icons/arrow-left.svg" alt="seta pra esqueda">
            <a href="./Apresentação.html">
                <p>Voltar para a página inicial</p>
            </a>
        </section>
    </main>   
</body>
</html>
