<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/Cadastro.css">
    <title>Cadastre-se</title>
</head>
<body>
    <main>
        <section class="logotipo">
            <div id="logo">T</div>
            <h1>TechLaço</h1>
        </section>

        <section class="cadastro">
            <div id="titulo">
                <h1>Crie sua conta</h1>
                <h3>Junte-se à TechLaço e comece sua jornada</h3>
            </div>

            <div id="tiposDeCadastro">
                    <div class="cardOpcaoCadastro cardOpcaoCadastroAtivo"><img src="../Assets/Icons/blue-briefcase.svg" alt="icone Trabalho"> Quero Contratar</div>
                    <div class="cardOpcaoCadastro"><img src="../Assets/Icons/gray-code.svg" alt="">Quero Construir</div>
            </div>

            <form action="" method="post">
                <div id="nomeSobrenome">
                    <div id="primeiroNome">
                        <label for="nome">Nome</label>
                        <input id="nome" type="text" placeholder="João" required="true">
                    </div>

                    <div id="segundoNome">
                        <label for="sobrenome">Sobrenome</label>
                        <input id="sobrenome" type="text" placeholder="Silva" required="true">
                    </div>
                </div>

                <div id="containerParaAnimacaoGithub" class="transicaoInput">
                    <div id="inputGithub">
                        <label for="github">Link do seu GitHub</label>
                        <input type="url" id="github" name="github" placeholder="https://github.com/seu-perfil">
                    </div>
                </div>

                <div id="inputEmail">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="seu@email.com" required="true">
                </div>

                <div id="inputSenha">
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="suaSenha" required="true">
                    <span>Mínimo de 8 caracteres</span>
                </div>

                <button type="submit">Criar Conta</button>

                <span id="possuiConta">Já tem uma conta? <a href="./Login.html">Entrar</a></span>
            </form>
        </section>

        <section class="voltar">
            <img src="../Assets/Icons/arrow-left.svg" alt="seta pra esqueda">
            <a href="./Apresentação.html">
                <p>Voltar para a página inicial</p>
            </a>
        </section>
    </main>
    <script src="../Scripts/Cadastro.js"></script>
</body>
</html>
